<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét Mã QR - Cash Manager</title>
    <!-- Tải SDK Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --bg: #0d0e15;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #f5f5f7;
            --text-muted: #86868b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .icon-container {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(138, 43, 226, 0.1);
            border: 1px solid rgba(138, 43, 226, 0.2);
            box-shadow: 0 0 20px var(--primary-glow);
            animation: pulse 2s infinite;
        }

        .icon {
            font-size: 2.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a25df5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .btn {
            background: linear-gradient(135deg, #8a2be2 0%, #4a0e80 100%);
            border: none;
            color: white;
            padding: 0.85rem 1.75rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px var(--primary-glow);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .status {
            font-size: 0.85rem;
            color: #ff453a;
            margin-top: 0.5rem;
            min-height: 20px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px var(--primary-glow);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px var(--primary-glow);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <span class="icon">📷</span>
        </div>
        <h1>Quét Mã QR</h1>
        <p id="msg-desc">Đang khởi tạo máy ảnh của Telegram. Vui lòng hướng camera về phía mã QR để quét.</p>
        <button class="btn" id="btn-retry" style="display: none;" onclick="triggerScanner()">Quét lại</button>
        <div class="status" id="error-status"></div>
    </div>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.ready();

        function showStatus(text, isError = false) {
            const statusEl = document.getElementById('error-status');
            const descEl = document.getElementById('msg-desc');
            if (isError) {
                statusEl.textContent = text;
                descEl.style.display = 'none';
                document.getElementById('btn-retry').style.display = 'block';
            } else {
                statusEl.textContent = '';
                descEl.textContent = text;
                descEl.style.display = 'block';
            }
        }

        function triggerScanner() {
            showStatus("Đang mở camera quét QR...");
            document.getElementById('btn-retry').style.display = 'none';

            // Kiểm tra xem Telegram client có hỗ trợ tính năng quét QR không
            if (!webapp.isVersionAtLeast('6.4')) {
                showStatus("Phiên bản Telegram của bạn quá cũ và không hỗ trợ quét QR trực tiếp. Vui lòng cập nhật ứng dụng hoặc gửi hình ảnh QR vào chat để quét.", true);
                return;
            }

            try {
                webapp.showScanQrPopup({
                    text: "Quét mã QR VietQR cửa hàng/hóa đơn"
                }, function(qrData) {
                    if (qrData) {
                        // Gửi dữ liệu quét được về cho Bot
                        webapp.sendData(qrData);
                        webapp.closeScanQrPopup();
                        webapp.close();
                        return true;
                    }
                    showStatus("Không nhận được dữ liệu QR.", true);
                    return false;
                });
            } catch (err) {
                showStatus("Lỗi mở camera: " + err.message, true);
            }
        }

        // Tự động kích hoạt khi trang tải xong
        window.addEventListener('load', () => {
            // Đợi 300ms để đảm bảo SDK sẵn sàng hoàn toàn
            setTimeout(triggerScanner, 300);
        });
    </script>
</body>
</html>
